apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: url-shortener
  namespace: url-shortener
  annotations:
    kubernetes.io/ingress.class: traefic

spec:
  rules:
    - http:
        paths:
          - path: /
            backend:
              service:
                name: url-shortener
                port:
                  number: 8050
            pathType: Prefix
